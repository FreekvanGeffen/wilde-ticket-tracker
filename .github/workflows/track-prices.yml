name: Track ticket prices

on:  
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ticket-price-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run price tracker
        run: uv run python ticket_price_tracker.py --csv ticket_price_history.csv

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ticket_price_history.csv
          if git diff --staged --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "chore: update ticket price history [skip ci]"
          git push
